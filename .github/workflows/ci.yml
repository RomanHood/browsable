name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rspec:
    name: rspec (${{ matrix.gem }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gem: [browsable, browsable-lsp]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ${{ matrix.gem }}

      - name: Run tests
        working-directory: ${{ matrix.gem }}
        run: bundle exec rspec
